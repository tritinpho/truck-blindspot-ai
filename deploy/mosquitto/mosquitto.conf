# Mosquitto config for BSW development (ADR-0002, 04 §4.1).
# Two listeners: native MQTT for services/sensors, WebSocket for the browser HMI.

listener 1883
protocol mqtt

listener 9001
protocol websockets

# Prototype is local-only; auth/TLS are deferred to the vehicle pilot (10 #15, 03 §3.8).
allow_anonymous true

# No on-disk persistence in dev — zone state is retained in-broker at runtime and
# the fusion engine republishes on a fixed cadence (04 §4.1).
persistence false
