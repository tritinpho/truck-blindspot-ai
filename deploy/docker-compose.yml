# BSW dev stack (ADR-0002). Sprint 0: the broker only.
# Fusion, HMI, and the simulator are added as their images land (S1+).
# Usage:  docker compose -f deploy/docker-compose.yml up -d
services:
  broker:
    image: eclipse-mosquitto:2
    container_name: bsw-broker
    ports:
      - "1883:1883"   # MQTT — fusion, simulator, ESP32 sensor nodes
      - "9001:9001"   # MQTT over WebSocket — in-cabin HMI
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped
