# BSW dev stack (ADR-0002). `docker compose up` now brings up the broker + the fusion engine
# (S5 — the images have landed). The in-cabin HMI is served on demand via the `hmi` profile; the
# simulator / scenario_runner drives the pipeline from the host (parity, ADR-0005).
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d                 # broker + fusion (pipeline)
#   docker compose -f deploy/docker-compose.yml --profile hmi up -d   # + served HMI at :8080
#   python tools/scenario_runner.py S2 --live                         # drive a scenario
#   # open the HMI: http://localhost:8080  (or `cd apps/hmi && npm run dev`)
services:
  broker:
    image: eclipse-mosquitto:2.0
    container_name: bsw-broker
    # Bind published ports to loopback for the dev bench: the broker is anonymous (mosquitto.conf),
    # so do NOT expose it on 0.0.0.0 where any host on the LAN could publish bsw/cmd/fusion or spoof
    # bsw/zone/#. All clients (fusion, sim, HMI) use localhost. The vehicle pilot adds auth+TLS
    # (docs/22) before anything binds a routable interface.
    ports:
      - "127.0.0.1:1883:1883"   # MQTT — fusion, simulator, ESP32 sensor nodes
      - "127.0.0.1:9001:9001"   # MQTT over WebSocket — in-cabin HMI
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  fusion:
    build:
      context: ..
      dockerfile: services/fusion-engine/Dockerfile
    container_name: bsw-fusion
    depends_on:
      - broker
    volumes:
      - ../config:/app/config:ro   # frozen-contract config; reload_config re-reads host edits
      # events.jsonl/.db on the host for tools/log_replay.py (11 §11.6). The container runs non-root
      # (UID 10001), so on a host that enforces bind-mount ownership this dir must be writable by it
      # (CI runs `chmod 777 logs` first; Docker Desktop bind mounts are already permissive).
      - ../logs:/app/logs
    # connects to the broker by service name; if it starts first it restarts until the broker is up
    restart: unless-stopped

  hmi:
    build:
      context: ..
      dockerfile: apps/hmi/Dockerfile
    container_name: bsw-hmi
    profiles: ["hmi"]
    depends_on:
      - broker
    ports:
      # host 8080 → container 8080 (the non-root nginx-unprivileged port). Loopback-only, like the
      # broker. http://localhost:8080 → static HMI; the browser talks to ws://localhost:9001.
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
