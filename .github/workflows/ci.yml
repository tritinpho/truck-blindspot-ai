name: ci

on:
  push:
  pull_request:

jobs:
  # L1 contract + L2 fusion logic + L3 scenario suite (sim/real parity, ADR-0005). All run
  # without hardware or a broker; L3 replays S1-S6 + faults through the real fusion engine.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r tests/requirements.txt
      - run: pytest -q tests/test_contracts.py                       # L1 — contract tests
      - run: pytest -q services/fusion-engine/tests                  # L2 — fusion logic
      - run: pytest -q tests/test_scenarios.py tests/test_tools.py   # L3 — scenarios + eval-tool cores
