name: ci

on:
  push:
  pull_request:

jobs:
  # L1 — contract tests: every wire message + both config files validate against schemas/.
  # (L2 fusion unit tests and L3 scenario tests are added in S2 and S4.)
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r tests/requirements.txt
      - run: pytest -q tests/                         # L1 contract tests
      - run: pytest -q services/fusion-engine/tests   # L2 fusion logic (grows in S2)
