<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>BSW — Cảnh báo điểm mù</title>
    <style>
      :root {
        --bg: #0b0e13; --panel: #0e131b; --line: rgba(120,128,140,0.25);
        --text: #cdd6e0; --dim: #8a94a4;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
        font-family: system-ui, sans-serif; overflow: hidden; -webkit-user-select: none; user-select: none; }
      #app { height: 100%; display: flex; flex-direction: column; }

      /* status bar */
      #statusbar { display: flex; align-items: center; gap: 12px; padding: 8px 14px;
        border-bottom: 1px solid var(--line); flex: 0 0 auto; }
      #title { font-weight: 700; letter-spacing: 1px; cursor: default; }
      #spacer { flex: 1 1 auto; }
      #soundHint { font-size: 13px; color: var(--dim); }
      #health { font-size: 14px; font-variant-numeric: tabular-nums; }
      .pip { width: 12px; height: 12px; border-radius: 50%; background: #39d98a; display: inline-block;
        box-shadow: 0 0 8px currentColor; }
      #statusbar button { background: transparent; border: 1px solid var(--line); color: var(--text);
        border-radius: 8px; padding: 6px 10px; font-size: 15px; cursor: pointer; min-width: 56px; }
      #statusbar button:active { background: rgba(255,255,255,0.06); }

      /* stage + scene */
      #stage { position: relative; flex: 1 1 auto; display: flex; align-items: center;
        justify-content: center; min-height: 0; }
      #scene { background: var(--panel); border-radius: 10px; }

      /* warming-up overlay */
      #overlay { position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px; background: rgba(11,14,19,0.92); }
      #overlay .spin { width: 46px; height: 46px; border-radius: 50%;
        border: 4px solid rgba(246,183,60,0.25); border-top-color: #f6b73c; animation: spin 0.9s linear infinite; }
      #warmingTitle { font-size: 24px; font-weight: 700; letter-spacing: 2px; color: #f6b73c; }
      #warmingSub { color: var(--dim); font-size: 15px; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* banner */
      #banner { flex: 0 0 auto; min-height: 60px; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 2px; margin: 10px; padding: 8px 14px;
        border: 2px solid var(--line); border-radius: 10px; text-align: center; }
      #banner strong { font-size: 26px; letter-spacing: 1px; }
      #banner .sub { font-size: 15px; opacity: 0.9; }

      /* panels (settings / diagnostics) */
      .panel { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column;
        padding: 12px 16px; overflow: auto; }
      .panelHead { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
      .panelHead h2 { margin: 0; font-size: 20px; }
      .panelHead .grow { flex: 1; }
      .backBtn { background: transparent; border: 1px solid var(--line); color: var(--text);
        border-radius: 8px; padding: 8px 14px; font-size: 15px; cursor: pointer; }

      #thresholdsLabel { color: var(--dim); font-size: 13px; text-transform: uppercase;
        letter-spacing: 1px; margin: 6px 0; }
      .zoneRow { display: grid; grid-template-columns: 24px 120px 1fr 1fr; gap: 12px; align-items: center;
        padding: 8px 0; border-bottom: 1px solid rgba(120,128,140,0.12); }
      .zoneRowName { font-weight: 600; }
      .field { display: flex; flex-direction: column; gap: 3px; }
      .fieldLabel { font-size: 12px; color: var(--dim); }
      .sliderWrap { display: flex; align-items: center; gap: 8px; }
      .sliderWrap input[type=range] { flex: 1; }
      .sliderOut { font-variant-numeric: tabular-nums; font-size: 13px; min-width: 48px; color: var(--text); }
      .settingsFooter { display: flex; gap: 24px; align-items: center; margin-top: 18px; flex-wrap: wrap; }
      .settingsFooter label { display: flex; align-items: center; gap: 10px; }
      select, input[type=range] { accent-color: #4a90d9; }

      /* diagnostics table */
      #diagnostics table { width: 100%; border-collapse: collapse; font-size: 14px;
        font-variant-numeric: tabular-nums; }
      #diagnostics th, #diagnostics td { text-align: left; padding: 5px 8px;
        border-bottom: 1px solid rgba(120,128,140,0.12); }
      #diagnostics th { color: var(--dim); font-weight: 600; }
      #diagnostics tr.sep td { color: var(--dim); text-transform: uppercase; font-size: 11px;
        letter-spacing: 1px; padding-top: 12px; }
      #diagnostics td em { color: var(--dim); font-style: normal; font-size: 12px; }
      #diagnostics .muted { color: var(--dim); }
      #diagRate { color: var(--dim); font-size: 14px; font-variant-numeric: tabular-nums; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="app">
      <header id="statusbar">
        <span id="title">BSW</span>
        <span id="spacer"></span>
        <span id="soundHint" class="hidden"></span>
        <span id="pip" class="pip"></span>
        <span id="health"></span>
        <button id="mute" title="Mute">🔊</button>
        <button id="gear" title="Settings">⚙</button>
      </header>

      <main id="stage">
        <canvas id="scene"></canvas>
        <div id="overlay" class="hidden">
          <div class="spin"></div>
          <div id="warmingTitle">WARMING UP</div>
          <div id="warmingSub">not yet monitoring</div>
        </div>
      </main>

      <footer id="banner"></footer>

      <!-- Settings / calibration (FR-12) -->
      <section id="settings" class="panel hidden">
        <div class="panelHead">
          <button id="settingsBack" class="backBtn">‹ Back</button>
          <h2 id="settingsTitle">Settings</h2>
        </div>
        <div id="thresholdsLabel">Alert thresholds</div>
        <div id="zoneRows"></div>
        <div class="settingsFooter">
          <label><span id="volLabel">Volume</span>
            <input id="vol" type="range" min="0" max="1" step="0.05" /></label>
          <label><span id="langLabel">Language</span>
            <select id="lang">
              <option value="vi">Tiếng Việt</option>
              <option value="en">English</option>
            </select></label>
        </div>
      </section>

      <!-- Hidden diagnostics (NFR-11): long-press the title or press "d" -->
      <section id="diagnostics" class="panel hidden">
        <div class="panelHead">
          <button id="diagBack" class="backBtn">‹ Back</button>
          <h2 id="diagTitle">Diagnostics</h2>
          <span class="grow"></span>
          <span id="diagRate"></span>
        </div>
        <table>
          <thead><tr id="diagHead"></tr></thead>
          <tbody id="diagBody"></tbody>
        </table>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
